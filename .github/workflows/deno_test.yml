name: Deno Test

on:
  push:
    # main以外へのpush
    branches-ignore:
      - main
    paths:
      - "**/*.ts"
      - ".github/workflows/deno_test.yml"
      - "flake.nix"
      - "flake.lock"
      - "**/deno.lock"
      - "**/deno.json"
  # mainブランチへのPRとその更新
  pull_request:
    branches: ["main"]
    paths:
      - "**/*.ts"
      - ".github/workflows/deno_test.yml"
      - "flake.nix"
      - "flake.lock"
      - "**/deno.lock"
      - "**/deno.json"

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8887e596b4ee1134dae06b98d573bd674693f47c # v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Run Deno tests
        run: nix develop --command -- bash -c "cd org_ranker && deno test --allow-net --allow-env"
